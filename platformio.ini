; PlatformIO Project Configuration
; AIAA SLI 2024-2025 - Rocket Avionics
;
; Build a specific environment:
;   pio run -e fullscale_flight
;   pio run -e fullscale_groundstation
;   pio run -e subscale_v1
;   pio run -e subscale_v2
;
; Upload to a specific board:
;   pio run -e fullscale_flight -t upload

[platformio]
default_envs = fullscale_flight
src_dir = src

; --- Shared Teensy 4.1 settings ---
[env]
platform = teensy
board = teensy41
framework = arduino

; --- Fullscale Flight Computer ---
[env:fullscale_flight]
build_src_filter = +<fullscale_flight/>
lib_deps =
    adafruit/Adafruit GPS Library
    adafruit/Adafruit BNO055
    adafruit/Adafruit BME280 Library
    adafruit/Adafruit Unified Sensor
    mikem/RadioHead

; --- Fullscale Ground Station ---
[env:fullscale_groundstation]
build_src_filter = +<fullscale_groundstation/>
lib_deps =
    adafruit/Adafruit GPS Library
    mikem/RadioHead
    waspinator/AccelStepper
; NOTE: AccelStepperWithDistance is a custom library.
;       Place it in the lib/ directory manually.
;       See: https://github.com/ThingEngineer/AccelStepperWithDistance

; --- Subscale V1 ---
[env:subscale_v1]
build_src_filter = +<subscale_v1/>
lib_deps =
    adafruit/Adafruit SGP30 Sensor

; --- Subscale V2 ---
[env:subscale_v2]
build_src_filter = +<subscale_v2/>
lib_deps =
    adafruit/Adafruit SGP30 Sensor

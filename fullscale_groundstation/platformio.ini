; PlatformIO Project Configuration
; AIAA SLI 2024-2025 - Fullscale Ground Station
;
; Build:  pio run
; Upload: pio run -t upload

[env:fullscale_groundstation]
platform = teensy
board = teensy41
framework = arduino
lib_deps =
    adafruit/Adafruit GPS Library
    mikem/RadioHead
    waspinator/AccelStepper
; NOTE: AccelStepperWithDistance is a custom library.
;       Place it in the lib/ directory manually.
;       See: https://github.com/ThingEngineer/AccelStepperWithDistance
